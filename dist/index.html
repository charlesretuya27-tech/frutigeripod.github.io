  <!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Frutiger iPod Player</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

</head>

<body>

  <div id="ipod">

    <!-- 🌊 SCREEN (Frutiger Aero Glass Display) -->
    <div id="screen">

      <!-- ALBUM ART -->
      <div id="album-art">

        <img src="https://preview.redd.it/kiiikiii-delulu-pack-the-2nd-ep-v0-kqszbqyfunfg1.jpg?width=1080&crop=smart&auto=webp&s=8739e740a4b41ba32a95cf6e1999ab8d822832a7" class="active" id="_1">

        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRKW0CCzgobMCG4G8bz88Rg_jRI0ewb2_mjyQ&s" id="_2">

        <img src="https://media.pitchfork.com/photos/69cd5ad80c5bb9f902012376/1:1/w_450%2Cc_limit/Slayyyter%2520-%2520WOR$T%2520GIRL%2520IN%2520AMERICA%2520album%2520art.jpg" id="_3">

        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTppEYHbWZog5DA1gA3JhHOY3IQaMLh6UNSQg&s" id="_4">

        <img src="https://i.scdn.co/image/ab67616d0000b27326f415d6e63f8b1768cd1998" id="_5">

      </div>

      <!-- TEXT + CONTROLS PANEL -->
      <div id="track-info">

        <div id="album-name"></div>
        <div id="track-name"></div>

        <div id="track-time">
          <div id="current-time"></div>
          <div id="track-length"></div>
        </div>

        <div id="seek-bar-container">
          <div id="seek-bar"></div>
        </div>

      </div>

    </div>

    <!-- 🎛 CLICK WHEEL -->
    <div id="wheel">

      <div id="wheel-center">
        <div id="play-pause-button">
          <i class="fa-solid fa-play"></i>
        </div>
      </div>

      <div id="play-previous" class="wheel-btn">
        <i class="fa-solid fa-backward-step"></i>
      </div>

      <div id="play-next" class="wheel-btn">
        <i class="fa-solid fa-forward-step"></i>
      </div>

    </div>
    <script src='https://code.jquery.com/jquery-3.6.0.min.js'></script><script  src="./script.js"></script>

  </body>
  
</html>
